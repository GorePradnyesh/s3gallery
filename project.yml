name: S3Gallery

options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  aws-sdk-swift:
    url: https://github.com/awslabs/aws-sdk-swift
    from: "1.0.0"

schemes:
  S3Gallery:
    build:
      targets:
        S3Gallery: all
        S3GalleryTests: [test]
        S3GalleryIntegrationTests: [test]
        S3GalleryUITests: [test]
    test:
      targets:
        - S3GalleryTests
        - S3GalleryUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  S3GalleryUnitTests:
    build:
      targets:
        S3Gallery: all
        S3GalleryTests: [test]
    test:
      targets:
        - S3GalleryTests
      gatherCoverageData: true

targets:
  S3Gallery:
    type: application
    platform: iOS
    sources:
      - path: S3Gallery
    dependencies:
      - package: aws-sdk-swift
        product: AWSS3
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: QMB2PQ2M6U
    info:
      path: S3Gallery/Info.plist
      properties:
        CFBundleName: S3Gallery
        CFBundleDisplayName: S3 Gallery
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: Not used
        UIRequiresFullScreen: false

  S3GalleryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/S3GalleryTests
    dependencies:
      - target: S3Gallery
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/S3Gallery.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/S3Gallery
        BUNDLE_LOADER: $(TEST_HOST)

  S3GalleryIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/S3GalleryIntegrationTests
    dependencies:
      - target: S3Gallery
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/S3Gallery.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/S3Gallery
        BUNDLE_LOADER: $(TEST_HOST)

  S3GalleryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/S3GalleryUITests
    dependencies:
      - target: S3Gallery
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: S3Gallery
